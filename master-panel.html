<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MASTER ADMIN - Global HAI Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10 font-mono">
    <h1 class="text-red-500 text-4xl mb-10 border-b-2 border-red-500 inline-block">SYSTEM OVERRIDE: GLOBAL NODES</h1>
    
    <div id="stats" class="grid grid-cols-2 gap-10 mb-10"></div>

    <div class="bg-gray-900 border border-gray-700 rounded-xl p-5">
        <h2 class="mb-5 text-xl">All Global Posts Management</h2>
        <div id="postList" class="space-y-4"></div>
    </div>

    <script>
        const API = "http://localhost:8080/api/admin";

        async function loadAdmin() {
            const res = await fetch(`${API}/master-data`);
            const data = await res.json();
            
            document.getElementById('stats').innerHTML = `
                <div class="bg-gray-800 p-5 rounded-xl border border-blue-500">Users: ${data.users}</div>
                <div class="bg-gray-800 p-5 rounded-xl border border-green-500">Active Posts: ${data.posts.length}</div>
            `;

            document.getElementById('postList').innerHTML = data.posts.map(p => `
                <div class="flex justify-between items-center p-3 border-b border-gray-800">
                    <div>
                        <b>${p.username}</b>: ${p.content.substring(0, 30)}...
                        <div class="text-xs text-gray-500">Views: ${p.views}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="boost('${p._id}')" class="bg-orange-600 px-3 py-1 rounded">BOOST</button>
                        <button onclick="del('${p._id}')" class="bg-red-600 px-3 py-1 rounded">DEL</button>
                    </div>
                </div>
            `).join('');
        }

        async function boost(id) {
            await fetch(`${API}/boost/${id}`, { method: 'POST' });
            loadAdmin();
        }

        async function del(id) {
            if(confirm('Delete permanently?')) {
                await fetch(`${API}/delete/${id}`, { method: 'DELETE' });
                loadAdmin();
            }
        }

        loadAdmin();
    </script>
</body>
</html>
